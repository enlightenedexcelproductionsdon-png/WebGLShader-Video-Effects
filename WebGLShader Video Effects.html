<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Shader Video Effects</title>
    <style>
body {
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffff00, #32cd32, #1e90ff, #9370db);
    background-size: 400% 400%;
    animation: gradientShift 10s ease infinite;
    margin: 0;
    padding: 20px;
    color: #fff;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    color: #ff0000;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    font-size: 2.5em;
    margin-bottom: 20px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 20px 0;
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

video, canvas {
    border: 3px solid #ff0000;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(255,0,0,0.3);
    max-width: 100%;
    height: auto;
}

.controls {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    align-items: center;
    background: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

label {
    color: #fff;
    font-weight: bold;
    margin-right: 5px;
}

select, input[type="file"], input[type="range"] {
    padding: 8px 12px;
    border: 2px solid #ff0000;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.9);
    color: #333;
    font-size: 14px;
    transition: all 0.3s ease;
}

select:hover, input[type="file"]:hover, input[type="range"]:hover {
    border-color: #ff4500;
    box-shadow: 0 0 10px rgba(255,0,0,0.5);
}

select:focus, input[type="file"]:focus, input[type="range"]:focus {
    outline: none;
    border-color: #ff6347;
    box-shadow: 0 0 15px rgba(255,99,71,0.7);
}

button {
    padding: 10px 20px;
    background: linear-gradient(45deg, #ff0000, #ff4500);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(255,0,0,0.3);
}

button:hover {
    background: linear-gradient(45deg, #ff4500, #ff6347);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,0,0,0.4);
}

button:active {
    transform: translateY(0);
}

#speedValue {
    color: #fff;
    font-weight: bold;
    min-width: 50px;
    text-align: center;
}

input[type="checkbox"] {
    margin-right: 5px;
}

label[for="performanceMode"] {
    display: flex;
    align-items: center;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

label[for="performanceMode"]:hover {
    background: rgba(255, 255, 255, 0.2);
}

#downloadBtn {
    text-decoration: none;
}

#downloadBtn button {
    background: linear-gradient(45deg, #32cd32, #228b22);
}

#downloadBtn button:hover {
    background: linear-gradient(45deg, #228b22, #006400);
}
    </style>
</head>
<body>
    <h1>WebGL Shader Video Effects</h1>
    <div class="container">
        <video id="video" autoplay muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="controls">
        <label for="videoFile">Import Video:</label>
        <input type="file" id="videoFile" accept="video/*">
        <label for="effect">Effect:</label>
        <select id="effect">
            <option value="none">None</option>
            <option value="grayscale">Grayscale</option>
            <option value="sepia">Sepia</option>
            <option value="invert">Invert</option>
            <option value="blur">Blur</option>
            <option value="waveWarp">Wave Warp</option>
            <option value="noiseTexture">Noise Texture</option>
            <option value="swirl">Swirl</option>
            <option value="tiles">Tiles</option>
        </select>
        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="0.25" max="4.00" step="0.01" value="1.00">
        <span id="speedValue">1.00x</span>
        <label for="performanceMode">
            <input type="checkbox" id="performanceMode"> Performance Mode
        </label>
        <button id="recordBtn">Start Recording</button>
        <a id="downloadBtn" style="display:none;" download="processed_video.webm"><button>Download Video</button></a>
    </div>
    <script>
// Vertex shader
const vertexShaderSource = `
    attribute vec2 a_position;
    attribute vec2 a_texCoord;
    varying vec2 v_texCoord;

    void main() {
        gl_Position = vec4(a_position, 0.0, 1.0);
        v_texCoord = a_texCoord;
    }
`;

// Fragment shaders for different effects
const fragmentShaders = {
    none: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;

        void main() {
            gl_FragColor = texture2D(u_texture, v_texCoord);
        }
    `,
    grayscale: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;

        void main() {
            vec4 color = texture2D(u_texture, v_texCoord);
            float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            gl_FragColor = vec4(vec3(gray), color.a);
        }
    `,
    sepia: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;

        void main() {
            vec4 color = texture2D(u_texture, v_texCoord);
            float r = color.r * 0.393 + color.g * 0.769 + color.b * 0.189;
            float g = color.r * 0.349 + color.g * 0.686 + color.b * 0.168;
            float b = color.r * 0.272 + color.g * 0.534 + color.b * 0.131;
            gl_FragColor = vec4(r, g, b, color.a);
        }
    `,
    invert: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;

        void main() {
            vec4 color = texture2D(u_texture, v_texCoord);
            gl_FragColor = vec4(1.0 - color.rgb, color.a);
        }
    `,
    blur: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;
        uniform vec2 u_resolution;

        void main() {
            vec2 texelSize = 1.0 / u_resolution;
            vec4 color = vec4(0.0);
            for (int x = -2; x <= 2; x++) {
                for (int y = -2; y <= 2; y++) {
                    vec2 offset = vec2(float(x), float(y)) * texelSize;
                    color += texture2D(u_texture, v_texCoord + offset);
                }
            }
            gl_FragColor = color / 25.0;
        }
    `,
    waveWarp: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;
        uniform float u_time;

        void main() {
            vec2 uv = v_texCoord;
            uv.x += sin(uv.y * 10.0 + u_time * 5.0) * 0.05;
            uv.y += cos(uv.x * 8.0 + u_time * 3.0) * 0.03;
            gl_FragColor = texture2D(u_texture, uv);
        }
    `,
    noiseTexture: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;
        uniform float u_time;

        // Simple noise function
        float random(vec2 st) {
            return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
        }

        float noise(vec2 st) {
            vec2 i = floor(st);
            vec2 f = fract(st);
            float a = random(i);
            float b = random(i + vec2(1.0, 0.0));
            float c = random(i + vec2(0.0, 1.0));
            float d = random(i + vec2(1.0, 1.0));
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
        }

        void main() {
            vec4 color = texture2D(u_texture, v_texCoord);
            vec2 noiseCoord = v_texCoord * 10.0 + u_time * 2.0;
            float n = noise(noiseCoord);
            vec3 noiseColor = vec3(n);
            gl_FragColor = vec4(mix(color.rgb, noiseColor, 0.3), color.a);
        }
    `,
    swirl: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;
        uniform float u_time;
        uniform vec2 u_resolution;

        void main() {
            vec2 center = vec2(0.5, 0.5);
            vec2 uv = v_texCoord - center;
            
            float dist = length(uv);
            float angle = atan(uv.y, uv.x);
            
            // Create swirl effect
            float swirlStrength = 5.0;
            float swirlSpeed = 2.0;
            angle += swirlStrength * dist * sin(u_time * swirlSpeed + dist * 10.0);
            
            // Convert back to cartesian coordinates
            vec2 swirledUV = center + vec2(cos(angle), sin(angle)) * dist;
            
            // Ensure UV coordinates stay within bounds
            swirledUV = clamp(swirledUV, vec2(0.0), vec2(1.0));
            
            gl_FragColor = texture2D(u_texture, swirledUV);
        }
    `,
    tiles: `
        precision mediump float;
        uniform sampler2D u_texture;
        varying vec2 v_texCoord;
        uniform float u_time;

        void main() {
            // Create a 2x2 tile grid
            vec2 tileCount = vec2(2.0, 2.0);
            vec2 tileSize = 1.0 / tileCount;
            
            // Get tile coordinates
            vec2 tileCoord = floor(v_texCoord * tileCount);
            vec2 localCoord = fract(v_texCoord * tileCount);
            
            // Add slight animation to tiles
            float offset = sin(u_time * 3.0 + tileCoord.x * 2.0 + tileCoord.y * 3.0) * 0.05;
            localCoord += vec2(offset, offset * 0.5);
            
            // Sample the texture
            gl_FragColor = texture2D(u_texture, localCoord);
        }
    `
};

let gl, program, texture, video, canvas, effectSelect, videoFileInput, recordBtn, downloadBtn, speedInput, speedValue, performanceMode;
let currentEffect = 'none';
let mediaRecorder, recordedChunks = [];
let startTime = Date.now();
let lastFrameTime = 0;

function init() {
    canvas = document.getElementById('canvas');
    video = document.getElementById('video');
    effectSelect = document.getElementById('effect');
    videoFileInput = document.getElementById('videoFile');
    recordBtn = document.getElementById('recordBtn');
    downloadBtn = document.getElementById('downloadBtn');
    speedInput = document.getElementById('speed');
    speedValue = document.getElementById('speedValue');
    performanceMode = document.getElementById('performanceMode');

    gl = canvas.getContext('webgl');
    if (!gl) {
        alert('WebGL not supported');
        return;
    }

    // Set canvas size
    setCanvasSize();

    // Initialize WebGL
    initShaders();
    initTexture();
    initBuffers();

    // Event listeners
    effectSelect.addEventListener('change', changeEffect);
    videoFileInput.addEventListener('change', handleVideoFile);
    recordBtn.addEventListener('click', toggleRecording);
    speedInput.addEventListener('input', updateSpeed);
    performanceMode.addEventListener('change', togglePerformanceMode);

    // Start webcam by default
    startWebcam();
}

function initShaders() {
    const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
    const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaders[currentEffect]);

    program = createProgram(vertexShader, fragmentShader);
    gl.useProgram(program);
}

function createShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Error compiling shader:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
    }
    return shader;
}

function createProgram(vertexShader, fragmentShader) {
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Error linking program:', gl.getProgramInfoLog(program));
        gl.deleteProgram(program);
        return null;
    }
    return program;
}

function initTexture() {
    texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
}

function initBuffers() {
    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    const positions = [
        -1, -1,
         1, -1,
        -1,  1,
         1,  1,
    ];
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

    const positionLocation = gl.getAttribLocation(program, 'a_position');
    gl.enableVertexAttribArray(positionLocation);
    gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

    const texCoordBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
    const texCoords = [
        0, 1,
        1, 1,
        0, 0,
        1, 0,
    ];
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(texCoords), gl.STATIC_DRAW);

    const texCoordLocation = gl.getAttribLocation(program, 'a_texCoord');
    gl.enableVertexAttribArray(texCoordLocation);
    gl.vertexAttribPointer(texCoordLocation, 2, gl.FLOAT, false, 0, 0);
}

function updateTexture() {
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
}

function render(currentTime = 0) {
    if (video.paused || video.ended) return;

    // Performance optimization: limit frame rate in performance mode
    if (performanceMode.checked && currentTime - lastFrameTime < 33) { // ~30 FPS
        animationId = requestAnimationFrame(render);
        return;
    }
    lastFrameTime = currentTime;

    updateTexture();

    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    // Set uniforms
    const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
    if (resolutionLocation) {
        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
    }

    const timeLocation = gl.getUniformLocation(program, 'u_time');
    if (timeLocation) {
        const elapsed = (Date.now() - startTime) / 1000.0;
        gl.uniform1f(timeLocation, elapsed);
    }

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    animationId = requestAnimationFrame(render);
}

function changeEffect() {
    currentEffect = effectSelect.value;
    initShaders();
    initBuffers();
    if (!video.paused) {
        render();
    }
}

function handleVideoFile(event) {
    const file = event.target.files[0];
    if (file) {
        const url = URL.createObjectURL(file);
        video.src = url;
        video.load();
        video.addEventListener('loadeddata', () => {
            render();
        });
    }
}

function startWebcam() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            video.addEventListener('loadedmetadata', () => {
                render();
            });
        })
        .catch(err => {
            console.error('Error accessing webcam:', err);
            alert('Could not access webcam. Please allow camera access.');
        });
}

function updateSpeed() {
    const speed = parseFloat(speedInput.value);
    video.playbackRate = speed;
    speedValue.textContent = speed.toFixed(2) + 'x';
}

function toggleRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.textContent = 'Start Recording';
    } else {
        startRecording();
        recordBtn.textContent = 'Stop Recording';
    }
}

function setCanvasSize() {
    if (performanceMode.checked) {
        canvas.width = 320;
        canvas.height = 180;
    } else {
        canvas.width = 640;
        canvas.height = 360;
    }
}

function togglePerformanceMode() {
    setCanvasSize();
    // Reinitialize buffers and shaders with new size
    initBuffers();
    if (!video.paused) {
        render();
    }
}

function startRecording() {
    const stream = canvas.captureStream(30); // 30 FPS
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    recordedChunks = [];

    mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
            recordedChunks.push(event.data);
        }
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        downloadBtn.href = url;
        downloadBtn.style.display = 'inline';
    };

    mediaRecorder.start();
}

let animationId;
window.onload = init;
    </script>
</body>
</html>
